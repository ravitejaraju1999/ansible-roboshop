- name: setup mysql server
  hosts: mysql
  become: yes
  vars:
    mysql_root_password: "RoboShop@1"

  tasks:

  - name: install MySQL community repo rpm (download first)
    ansible.builtin.get_url:
      url: https://dev.mysql.com/get/mysql80-community-release-el9-1.noarch.rpm
      dest: /tmp/mysql-release.rpm

  - name: install MySQL repo package
    ansible.builtin.package:
      name: /tmp/mysql-release.rpm
      state: present

  - name: install mysql server
    ansible.builtin.package:
      name: mysql-community-server
      state: present

  - name: start and enable mysql
    ansible.builtin.service:
      name: mysqld
      state: started
      enabled: yes

  - name: setup root password
    ansible.builtin.command: mysql_secure_installation --set-root-pass "{{ mysql_root_password }}"