- name: setup payment service
  hosts: payment
  become: yes
  tasks:
  - name: install python and dependencies
    ansible.builtin.dnf:
      name:
        - python3
        - gcc
        - python3-devel
      state: present



  - name: create roboshop system user
    ansible.builtin.user:
      name: roboshop
      comment: RoboShop System user
      system: true
      shell: /sbin/nologin
      home: /app

  - name: remove app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory
    ansible.builtin.file:
      state: directory
      path: /app

  - name: Delete payment file
    ansible.builtin.file:
      path: /tmp/payment.zip
      state: absent

  - name: download shipping application
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: extract shipping application
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app
      remote_src: yes


  - name: install dependencies using pip3
    ansible.builtin.pip:
      requirements: /app/requirements.txt
      executable: pip3

